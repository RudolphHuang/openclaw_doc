name: Test AINFT Install Script

on:
  workflow_dispatch:
    inputs:
      api_key:
        description: 'AINFT API Key for testing'
        required: true
        type: string
      default_model_index:
        description: 'Default model index (1-N)'
        required: false
        default: '1'
        type: string

jobs:

  test-macos:
    name: Test on macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup test environment
        run: |
          echo "=== System Info ==="
          uname -a
          echo ""
          echo "=== Check Bash Version ==="
          bash --version
          echo ""
          echo "=== Check/Install Node.js ==="
          if ! command -v node &> /dev/null; then
            brew install node@22
          fi
          node -v
          echo ""
          echo "=== Install OpenClaw (non-interactive) ==="
          npm install -g openclaw
          mkdir -p ~/.openclaw/bin
          ln -sf $(which openclaw) ~/.openclaw/bin/openclaw 2>/dev/null || true
          export PATH="$HOME/.openclaw/bin:$PATH"
          which openclaw
          openclaw --version
          echo ""
          echo "=== Initialize OpenClaw ==="
          mkdir -p ~/.openclaw
          echo '{}' > ~/.openclaw/openclaw.json

      - name: Run install script
        env:
          INSTALL_API_KEY: ${{ github.event.inputs.api_key }}
          INSTALL_DEFAULT_MODEL: ${{ github.event.inputs.default_model_index }}
        run: |
          echo "=== Running AINFT Install Script ==="
          echo ""
          export PATH="$HOME/.openclaw/bin:$PATH"
          
          # 使用本地脚本（当前仓库中的版本）
          SCRIPT_PATH="${{ github.workspace }}/scripts/openclaw/install-ainft-provider.sh"
          echo "Using local script: $SCRIPT_PATH"
          
          # 使用系统默认的 Bash (3.2+) 运行脚本
          printf '%s\n%s\n' "$INSTALL_API_KEY" "$INSTALL_DEFAULT_MODEL" | \
            bash "$SCRIPT_PATH" 2>&1
          
          exit_code=$?
          echo ""
          echo "=== Script exited with code $exit_code ==="
          
          echo ""
          echo "=== Check final config ==="
          cat ~/.openclaw/openclaw.json 2>/dev/null || echo "Config file not found"
          
          exit $exit_code
